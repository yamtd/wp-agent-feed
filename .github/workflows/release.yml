name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build release ZIP
        run: |
          git archive --format=zip --prefix=wp-agent-feed/ -o wp-agent-feed.zip HEAD
          unzip -l wp-agent-feed.zip

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: wp-agent-feed.zip
